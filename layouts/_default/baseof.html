<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#F2F2F7">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <style>
    :root {
      --bg-primary: #F2F2F7;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E5E5EA;
      --text-primary: #000000;
      --text-secondary: #8E8E93;
      --text-tertiary: #C7C7CC;
      --accent-blue: #007AFF;
      --accent-orange: #FF9500;
      --separator: rgba(60, 60, 67, 0.12);
      --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #000000;
        --bg-secondary: #1C1C1E;
        --bg-tertiary: #2C2C2E;
        --text-primary: #FFFFFF;
        --text-secondary: #8E8E93;
        --text-tertiary: #48484A;
        --separator: rgba(255, 255, 255, 0.12);
        --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-text-size-adjust: 100%;
    }
    /* Navigation Bar */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(242, 242, 247, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--separator);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    @media (prefers-color-scheme: dark) {
      .nav-bar { background: rgba(0, 0, 0, 0.65); }
    }
    .nav-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a {
      font-size: 15px;
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 400;
    }
    /* Large Title Header */
    .hero {
      padding: 24px 20px 16px;
      max-width: 680px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    /* Main Content */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    /* Grouped List Style (iOS) */
    .list-group {
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--card-shadow);
    }
    .list-item {
      padding: 16px 20px;
      border-bottom: 0.5px solid var(--separator);
      transition: background 0.15s ease;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--bg-tertiary); }
    .list-item h3 {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
      color: var(--text-primary);
    }
    .list-item h3 a {
      color: inherit;
      text-decoration: none;
    }
    .post-meta {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      background: var(--bg-tertiary);
      color: var(--accent-blue);
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .post-summary {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .chevron {
      float: right;
      color: var(--text-tertiary);
      font-size: 14px;
      margin-top: 2px;
    }
    /* Section Header */
    .section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin: 24px 20px 8px;
      letter-spacing: 0.02em;
    }
    /* Single Post */
    .single-post {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px 20px;
      margin-top: 16px;
      box-shadow: var(--card-shadow);
    }
    .single-post h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 12px;
    }
    .content {
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .content p { margin: 16px 0; }
    .content h2 {
      font-size: 22px;
      font-weight: 700;
      margin: 32px 0 16px;
      letter-spacing: -0.01em;
    }
    .content h3 {
      font-size: 19px;
      font-weight: 600;
      margin: 24px 0 12px;
    }
    .content ul, .content ol { margin: 16px 0 16px 24px; }
    .content li { margin: 8px 0; }
    .content blockquote {
      border-left: 3px solid var(--accent-blue);
      padding-left: 16px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-style: italic;
    }
    .content code {
      background: var(--bg-tertiary);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 15px;
      font-family: "SF Mono", "Courier New", monospace;
    }
    .content pre {
      background: var(--bg-tertiary);
      padding: 16px;
      overflow-x: auto;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 14px;
    }
    .content a { color: var(--accent-blue); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content img { max-width: 100%; border-radius: 10px; margin: 16px 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 15px;
    }
    .content th, .content td {
      padding: 12px;
      text-align: left;
      border-bottom: 0.5px solid var(--separator);
    }
    .content th {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
    }
    /* WeChat CTA Card */
    .cta-card {
      background: linear-gradient(135deg, #FF9500 0%, #FF6B35 100%);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin: 32px 0;
      color: white;
    }
    .cta-card p { margin: 6px 0; }
    .cta-card strong { font-size: 18px; font-weight: 700; }
    .cta-card a {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 10px 24px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 12px;
      backdrop-filter: blur(10px);
    }
    .cta-card a:active { background: rgba(255,255,255,0.35); }
    /* Footer */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    footer p { margin: 4px 0; }
    /* Mobile */
    @media (max-width: 600px) {
      .hero h1 { font-size: 28px; }
      .single-post h1 { font-size: 24px; }
      .content { font-size: 16px; }
      .nav-bar { padding: 10px 16px; }
      main { padding: 0 16px 32px; }
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 3px; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <span class="nav-title">{{ if .IsHome }}{{ .Site.Title }}{{ else }}文章{{ end }}</span>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/tags/">标签</a>
      <a href="/about/">关于</a>
    </div>
  </nav>

  {{ if .IsHome }}
  <div class="hero">
    <h1>{{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
  </div>
  {{ end }}

  <main>
    {{ block "main" . }}{{ .Content }}{{ end }}
  </main>

  <footer>
    <p>&copy; 2026 {{ .Site.Title }}</p>
    <p>关注公众号「甲方乙方供应链」</p>
  </footer>
</body>
</html>
